name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: TaradaciucNicolae
          outputs: |
            images/github-snake.svg
            images/github-snake-dark.svg?palette=github-dark

      - name: Commit and push snake files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images/github-snake.svg images/github-snake-dark.svg

          if git diff --cached --quiet; then
            echo "No snake changes to commit."
          else
            git commit -m "Generate contribution snake"
            git push
          fi
